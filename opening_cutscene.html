// Chromakey offscreen canvases
let princessClean, villainClean, dogClean;

function chromakey(img, threshold) {
  const c = document.createElement('canvas');
  c.width = img.width; c.height = img.height;
  const cx = c.getContext('2d');
  cx.drawImage(img, 0, 0);
  const id = cx.getImageData(0, 0, c.width, c.height);
  const d = id.data;
  for (let i = 0; i < d.length; i += 4) {
    if (d[i] < threshold && d[i+1] < threshold && d[i+2] < threshold) {
      d[i+3] = 0;
    }
  }
  cx.putImageData(id, 0, 0);
  return c;
}

      villainClean = chromakey(imgVillain, 45);
      dogClean = chromakey(imgDog, 45);
      startCutscene();
    }
  };
});

function drawSprite(cleanCanvas, sprite, dx, dy, scale, flipX) {
  ctx.save();
  if (flipX) {
    ctx.translate(dx + sprite.w * scale, dy);
    ctx.scale(-1, 1);
    ctx.drawImage(cleanCanvas, sprite.x, sprite.y, sprite.w, sprite.h, 0, 0, sprite.w * scale, sprite.h * scale);
  } else {
    ctx.drawImage(cleanCanvas, sprite.x, sprite.y, sprite.w, sprite.h, dx, dy, sprite.w * scale, sprite.h * scale);
  }
  ctx.restore();
}

function drawBg(scrollX) {
  // Draw background to fit exactly 640x360, no zoom
  ctx.drawImage(imgBg, scrollX, 0, imgBg.width - scrollX, imgBg.height, 0, 0, W, H);
}

function easeInOut(t) {
  return t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
}

function drawText(text, y, alpha, size) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#fff';
  ctx.font = (size || 16) + 'px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#000';
  ctx.shadowBlur = 4;
  ctx.shadowOffsetX = 2;
  ctx.shadowOffsetY = 2;
  ctx.fillText(text, W/2, y);
  ctx.restore();
}

function drawSubtitle(text, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  // Dark box at bottom
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, H - 50, W, 50);
  ctx.fillStyle = '#fff';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(text, W/2, H - 22);
  ctx.restore();
}

function render() {
  ctx.clearRect(0, 0, W, H);

  const sec = frame / FPS;
  const spriteScale = 1.8;
  const groundY = H - 55;

  // Scene timing (10 seconds total):
  // 0-4.0: Walking together peacefully
  // 4.0-6.5: Villain appears, approaches princess
  // 6.5-8.5: Kidnap sequence
  // 8.5-10: Dog alone + title

  if (sec < 4.0) {
    // === SCENE 1: Peaceful walk ===
    const progress = sec / 4.0;
    const scrollX = progress * 150; // source pixel scroll
    drawBg(scrollX);

    // Warm overlay
    ctx.fillStyle = 'rgba(255,240,200,0.1)';
    ctx.fillRect(0, 0, W, H);

    // Dog walking (flip to face right)
    const dogFrame = dogWalk[Math.floor(frame / 8) % dogWalk.length];
    const dogX = 180 + progress * 80;
    drawSprite(dogClean, dogFrame, dogX, groundY - dogFrame.h * spriteScale + 10, spriteScale, true);

    // Princess walking beside dog
    const princessFrame = princessWalk[Math.floor(frame / 7) % princessWalk.length];
    const princessX = dogX + 90;
    drawSprite(princessClean, princessFrame, princessX, groundY - princessFrame.h * spriteScale + 20, spriteScale, false);

    // Subtitle
    if (sec < 2.5) {
      const alpha = sec < 0.8 ? sec / 0.8 : (sec > 2.0 ? Math.max(0, 1 - (sec - 2.0)/0.5) : 1);
      drawSubtitle('어느 평화로운 날...', alpha);
    } else if (sec < 4.0) {
      const st = sec - 2.5;
      const alpha = st < 0.5 ? st / 0.5 : 1;
      drawSubtitle('유강이와 공주는 함께 산책을 하고 있었다', alpha);
    }

  } else if (sec < 6.5) {
    // === SCENE 2: Villain appears, approaches princess ===
    const progress = (sec - 4.0) / 2.5;
    drawBg(150);

    // Darkening sky
    ctx.fillStyle = `rgba(20,0,40,${Math.min(0.4, progress * 0.5)})`;
    ctx.fillRect(0, 0, W, H);

    // Dog stops (face right)
    const dogFrame = dogWalk[0];
    drawSprite(dogClean, dogFrame, 200, groundY - dogFrame.h * spriteScale + 10, spriteScale, true);

    // Princess idle
    const princessFrame = princessIdle[Math.floor(frame / 10) % princessIdle.length];
    const princessX = 350;
    drawSprite(princessClean, princessFrame, princessX, groundY - princessFrame.h * spriteScale + 20, spriteScale, false);

    // Villain flies in from right, stops near princess
    const villainFrame = villainFloat[Math.floor(frame / 10) % villainFloat.length];
    const villainStartX = W + 50;
    const villainEndX = princessX + 60; // stop right next to princess
    const villainX = villainStartX + (villainEndX - villainStartX) * Math.min(1, progress * 1.3);
    const villainY = groundY - villainFrame.h * spriteScale - 20 + Math.sin(frame * 0.1) * 6;
    drawSprite(villainClean, villainFrame, villainX, villainY, spriteScale, true);

    // Lightning flash
    if (sec > 4.3 && sec < 4.5) {
      ctx.fillStyle = `rgba(255,255,255,${0.3 * Math.sin((sec - 4.3) * Math.PI / 0.2)})`;
      ctx.fillRect(0, 0, W, H);
    }

    const st = sec - 4.0;
    const alpha = st < 0.5 ? st / 0.5 : 1;
    drawSubtitle('그때, 어둠 속에서 누군가 나타났다!', alpha);

  } else if (sec < 8.5) {
    // === SCENE 3: Kidnap ===
    const progress = (sec - 6.5) / 2.0;
    drawBg(150);

    // Dark overlay
    ctx.fillStyle = 'rgba(20,0,40,0.4)';
    ctx.fillRect(0, 0, W, H);

    // Dog watches the whole time (face right)
    const dogFrame = dogWalk[0];
    drawSprite(dogClean, dogFrame, 200, groundY - dogFrame.h * spriteScale + 10, spriteScale, true);

    const kidnapFrame = villainKidnap[Math.min(Math.floor(progress * villainKidnap.length), villainKidnap.length - 1)];

    if (progress < 0.4) {
      // Villain grabs princess (at princess position)
      const kidnapX = 360;
      const kidnapY = groundY - kidnapFrame.h * spriteScale + 10 - progress * 30;
      drawSprite(villainClean, kidnapFrame, kidnapX, kidnapY, spriteScale, true);

      const st = sec - 6.5;
      const alpha = st < 0.4 ? st / 0.4 : 1;
      drawSubtitle('"공주를 데려가겠다! 하하하!"', alpha);
    } else {
      // Flying away upward-right
      const flyProgress = (progress - 0.4) / 0.6;
      const kidnapX = 360 + flyProgress * 300;
      const kidnapY = groundY - kidnapFrame.h * spriteScale - 20 - flyProgress * 200;
      const alpha = Math.max(0, 1 - flyProgress * 0.9);
      ctx.globalAlpha = alpha;
      drawSprite(villainClean, kidnapFrame, kidnapX, kidnapY, spriteScale, true);
      ctx.globalAlpha = 1;

      const st = sec - 6.5 - 0.8;
      const subAlpha = st < 0 ? 0 : (st < 0.4 ? st / 0.4 : 1);
      drawSubtitle('"안돼! 공주!!"', subAlpha);
    }

  } else {
    // === SCENE 4: Dog alone + title ===
    const progress = (sec - 8.5) / 1.5;
    drawBg(150);

    // Dog drawn before overlay so it darkens with everything
    const dogFrame = dogWalk[0];
    drawSprite(dogClean, dogFrame, 200, groundY - dogFrame.h * spriteScale + 10, spriteScale, true);

    // Dark overlay on top of everything
    ctx.fillStyle = `rgba(0,0,0,${Math.min(0.65, 0.3 + progress * 0.5)})`;
    ctx.fillRect(0, 0, W, H);

    // Title
    if (progress > 0.2) {
      const titleAlpha = Math.min(1, (progress - 0.2) / 0.35);
      drawText('공주를 구해야 해!', H / 2, titleAlpha, 22);
    }
  }

  // Fade in from black at start
  if (sec < 0.7) {
    ctx.fillStyle = `rgba(0,0,0,${1 - sec / 0.7})`;
    ctx.fillRect(0, 0, W, H);
  }

  frame++;
  if (frame >= TOTAL_FRAMES) {
    return;
  }
  animId = requestAnimationFrame(render);
}

function startCutscene() {
  frame = 0;
  render();
}

function restartCutscene() {
  if (animId) cancelAnimationFrame(animId);
  startCutscene();
}

function togglePause() {
  if (paused) {
    paused = false;
    render();
  } else {
    paused = true;
    if (animId) cancelAnimationFrame(animId);
  }
}
</script>
